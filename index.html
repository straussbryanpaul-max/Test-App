<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>From Dad</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #fce4ec, #f8bbd0, #e1bee7, #bbdefb);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 32px 16px;
      transition: background 1s ease;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Per-person background themes */
    body.rachel { background: linear-gradient(135deg, #fce4ec, #f48fb1, #ff80ab, #ff4081, #f8bbd0); }
    body.ethan  { background: linear-gradient(135deg, #e3f2fd, #90caf9, #b3e5fc, #4fc3f7, #c8e6c9); }
    body.brooklyn { background: linear-gradient(135deg, #ede7f6, #ce93d8, #f3e5f5, #fff176, #e1bee7); }
    body.gwen   { background: linear-gradient(135deg, #fce4ec, #f8bbd0, #e1bee7, #bbdefb, #b2ebf2); }

    .floaters {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .floater {
      position: absolute;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0.5); opacity: 0.75; }
      100% { transform: translateY(-10vh) scale(1.3); opacity: 0; }
    }

    /* Name selector buttons */
    .selector {
      position: relative;
      z-index: 2;
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .name-btn {
      border: 2px solid rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(8px);
      border-radius: 50px;
      padding: 10px 24px;
      font-size: 1rem;
      font-family: 'Georgia', serif;
      cursor: pointer;
      color: #555;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }

    .name-btn:hover { transform: scale(1.07); background: rgba(255,255,255,0.6); }

    .name-btn.active {
      color: white;
      border-color: transparent;
      transform: scale(1.1);
      box-shadow: 0 4px 18px rgba(0,0,0,0.15);
    }

    .name-btn.rachel.active   { background: linear-gradient(135deg, #e91e63, #f06292); }
    .name-btn.ethan.active    { background: linear-gradient(135deg, #1976d2, #4fc3f7); }
    .name-btn.brooklyn.active { background: linear-gradient(135deg, #8e24aa, #ce93d8); }
    .name-btn.gwen.active     { background: linear-gradient(135deg, #f48fb1, #ce93d8); }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 40px 36px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.1);
      max-width: 440px;
      width: 90%;
    }

    .title {
      font-size: 1.2rem;
      color: #777;
      margin-bottom: 28px;
      letter-spacing: 0.04em;
      min-height: 1.6rem;
      transition: color 0.4s;
    }

    .msg-btn {
      border: none;
      border-radius: 50px;
      padding: 16px 40px;
      font-size: 1.2rem;
      font-family: 'Georgia', serif;
      cursor: pointer;
      color: white;
      letter-spacing: 0.04em;
      transition: transform 0.15s, box-shadow 0.15s, background 0.4s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .msg-btn:hover  { transform: scale(1.06); }
    .msg-btn:active { transform: scale(0.97); }

    .msg-btn.rachel   { background: linear-gradient(135deg, #e91e63, #f06292); }
    .msg-btn.ethan    { background: linear-gradient(135deg, #1976d2, #4fc3f7); }
    .msg-btn.brooklyn { background: linear-gradient(135deg, #8e24aa, #ce93d8); }
    .msg-btn.gwen     { background: linear-gradient(135deg, #f48fb1, #ce93d8); }

    .message {
      margin-top: 32px;
      font-size: 1.5rem;
      font-weight: bold;
      min-height: 3rem;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.5s ease, transform 0.5s ease, color 0.4s;
      line-height: 1.5;
    }

    .message.rachel   { color: #c2185b; }
    .message.ethan    { color: #1565c0; }
    .message.brooklyn { color: #6a1b9a; }
    .message.gwen     { color: #ad1457; }

    .message.show { opacity: 1; transform: scale(1); }

    .sparkles {
      font-size: 1.5rem;
      margin-top: 10px;
      min-height: 2rem;
      opacity: 0;
      transition: opacity 0.5s ease 0.2s;
    }

    .sparkles.show { opacity: 1; }

    .dad-photo {
      margin-top: 24px;
      width: 100%;
      max-width: 320px;
      max-height: 420px;
      object-fit: contain;
      image-orientation: from-image;
      border-radius: 20px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
      opacity: 0;
      transform: scale(0.8) rotate(-2deg);
      transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s;
      display: none;
    }

    .dad-photo.show {
      opacity: 1;
      transform: scale(1) rotate(-2deg);
      display: block;
    }
  </style>
</head>
<body>

  <div class="floaters" id="floaters"></div>

  <div class="selector">
    <button class="name-btn rachel" onclick="selectPerson('rachel')">Rachel</button>
    <button class="name-btn ethan"  onclick="selectPerson('ethan')">Ethan</button>
    <button class="name-btn brooklyn" onclick="selectPerson('brooklyn')">Brooklyn</button>
    <button class="name-btn gwen"   onclick="selectPerson('gwen')">Gwen</button>
  </div>

  <div class="card">
    <p class="title" id="title">Who's there? Pick your name above! 💌</p>
    <button class="msg-btn gwen" id="msgBtn" onclick="showMessage()">Get your message!</button>
    <div class="message" id="message"></div>
    <div class="sparkles" id="sparkles"></div>
    <img id="dadPhoto" class="dad-photo" src="" alt="Dad!" />

    function getPhotoPool(person) {
      const personal = (photos[person] || []).map(f => `images/${person}/${f}`);
      const shared   = photos.everyone.map(f => `images/everyone/${f}`);
      return [...personal, ...shared];
    }

    let currentPerson = 'gwen';
    let lastIndex = -1;
    let lastPhotoIndex = -1;

    function buildFloaters(person) {
      const container = document.getElementById('floaters');
      container.innerHTML = '';
      const emojis = people[person].floaters;
      for (let i = 0; i < 22; i++) {
        const el = document.createElement('span');
        el.classList.add('floater');
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.animationDuration = (5 + Math.random() * 8) + 's';
        el.style.animationDelay = (Math.random() * 8) + 's';
        el.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
        container.appendChild(el);
      }
    }

    function selectPerson(person) {
      currentPerson = person;
      lastIndex = -1;

      // Update body theme
      document.body.className = person;

      // Update name buttons
      document.querySelectorAll('.name-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.name-btn.${person}`).classList.add('active');

      // Update card elements
      document.getElementById('title').textContent = people[person].title;
      const btn = document.getElementById('msgBtn');
      btn.className = `msg-btn ${person}`;

      // Reset message and photo
      const msg = document.getElementById('message');
      const sparkles = document.getElementById('sparkles');
      const photo = document.getElementById('dadPhoto');
      msg.className = `message ${person}`;
      msg.classList.remove('show');
      sparkles.classList.remove('show');
      photo.classList.remove('show');
      msg.textContent = '';
      lastPhotoIndex = -1;

      buildFloaters(person);
    }

    function showMessage() {
      const data = people[currentPerson];
      const msg = document.getElementById('message');
      const sparkles = document.getElementById('sparkles');
      const photoEl = document.getElementById('dadPhoto');

      // Pick a random message
      let mi;
      do { mi = Math.floor(Math.random() * data.messages.length); } while (mi === lastIndex);
      lastIndex = mi;

      // Pick a random photo
      const pool = getPhotoPool(currentPerson);
      let pi;
      do { pi = Math.floor(Math.random() * pool.length); } while (pi === lastPhotoIndex && pool.length > 1);
      lastPhotoIndex = pi;

      // Reset
      msg.classList.remove('show');
      sparkles.classList.remove('show');
      photoEl.classList.remove('show');
      void msg.offsetWidth;

      msg.textContent = data.messages[mi];
      sparkles.textContent = data.sparkles;
      msg.classList.add('show');
      sparkles.classList.add('show');

      photoEl.style.display = 'block';
      photoEl.src = pool[pi];
      void photoEl.offsetWidth;
      photoEl.classList.add('show');
    }

    // Initialize with default
    selectPerson('gwen');

</html>
